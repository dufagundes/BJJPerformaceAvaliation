<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="#0b1f3a" stroke="#198754" stroke-width="1.5"/>
  
  <!-- Person icon -->
  <circle cx="32" cy="18" r="6" fill="#ffffff"/>
  <ellipse cx="32" cy="28" rx="9" ry="7" fill="#ffffff"/>
  
  <!-- Upward arrow -->
  <g transform="translate(45, 20)">
    <rect x="-1.5" y="0" width="3" height="12" fill="#198754" rx="1"/>
    <polygon points="0,-3 -3,3 3,3" fill="#198754"/>
  </g>
  
  <!-- Star -->
  <g transform="translate(20, 22) scale(0.8)">
    <polygon points="0,-4 1,-1 4,-1 2,1 2,4 0,2 -2,4 -2,1 -4,-1 -1,-1" fill="#fbbf24"/>
  </g>
</svg>